---
name: "Build & Push Docker Image"
description: >-
  Build a Docker image with multi-arch support (linux/amd64,linux/arm64) and
  push it to ghcr.io. Tags are derived from the git ref via docker/metadata-action.
  Push is automatically skipped for pull_request events and dependabot.

inputs:
  component-name:
    description: "Image name (without registry), e.g. qubership-docker-integration-tests"
    required: true
  file:
    description: "Path to the Dockerfile relative to the workspace"
    required: true
  context:
    description: "Build context relative to the workspace"
    required: true
  use-base-tag:
    description: >-
      When 'true', adds BASE_TAG=<computed-version> to the build args. Used by
      the hardening image which builds FROM the base image at the same git ref.
    required: false
    default: "false"
  github-token:
    description: "GITHUB_TOKEN used for ghcr.io login and package version cleanup"
    required: true

runs:
  using: "composite"
  steps:
    - name: Docker meta
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: |
          ghcr.io/${{ github.repository_owner }}/${{ inputs.component-name }}
        tags: |
          type=ref,event=branch
          type=ref,event=tag

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to ghcr.io
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.github-token }}

    - name: Get package IDs for delete
      id: get-ids-for-delete
      uses: Netcracker/get-package-ids@v0.0.1
      with:
        component-name: ${{ inputs.component-name }}
        component-tag: ${{ steps.meta.outputs.tags }}
        access-token: ${{ inputs.github-token }}
      if: ${{ github.event_name != 'pull_request' && github.actor != 'dependabot[bot]' }}

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        no-cache: true
        context: ${{ inputs.context }}
        file: ${{ inputs.file }}
        platforms: linux/amd64,linux/arm64
        # See https://docs.github.com/en/code-security/dependabot/working-with-dependabot/automating-dependabot-with-github-actions#fetching-metadata-about-a-pull-request
        push: ${{ github.event_name != 'pull_request' && github.actor != 'dependabot[bot]' }}
        provenance: false
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: ${{ inputs.use-base-tag == 'true' && format('BASE_TAG={0}', steps.meta.outputs.version) || '' }}

    - name: Delete old package versions
      uses: actions/delete-package-versions@v5
      with:
        package-name: ${{ inputs.component-name }}
        package-type: 'container'
        package-version-ids: ${{ steps.get-ids-for-delete.outputs.ids-for-delete }}
      if: ${{ steps.get-ids-for-delete.outputs.ids-for-delete != '' }}

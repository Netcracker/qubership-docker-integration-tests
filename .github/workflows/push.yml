---
name: Build Artifacts

on:
  release:
    types: [created]
  push:
    branches:
      - '**'
    paths-ignore:
      - '.github/**'
      - 'docs/**'
      - 'CODE-OF-CONDUCT.md'
      - 'CONTRIBUTING.md'
      - 'LICENSE'
      - 'README.md'
      - 'SECURITY.md'
  pull_request:
    branches:
      - '**'
    paths-ignore:
      - '.github/**'
      - 'docs/**'
      - 'CODE-OF-CONDUCT.md'
      - 'CONTRIBUTING.md'
      - 'LICENSE'
      - 'README.md'
      - 'SECURITY.md'

permissions:
  contents: read
  packages: write
  actions: read

concurrency:
  # On main/release, we don't want any jobs cancelled so the sha is used to name the group
  # On PR branches, we cancel the job if new commits are pushed
  # More info: https://stackoverflow.com/a/68422069/253468
  group: ${{ github.ref == 'refs/heads/main' && format('ci-main-{0}', github.sha) || format('ci-main-{0}', github.ref) }}
  cancel-in-progress: true

jobs:
  # Images that have no dependency on other images in this repository.
  # Run in parallel via the matrix.
  build-base:
    if: github.event.pull_request.user.login != 'dependabot[bot]' || github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        component:
          - name: qubership-docker-integration-tests
            file: Dockerfile
            context: .
          - name: qubership-docker-integration-tests-debian
            file: debian-build/Dockerfile
            context: .
          - name: qubership-docker-integration-tests-hardening-transfer
            file: container-hardening/docker-transfer/Dockerfile
            context: .
    runs-on: ubuntu-latest
    name: ${{ matrix.component.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Build & push image
        uses: ./.github/actions/build-docker-image
        with:
          component-name: ${{ matrix.component.name }}
          file: ${{ matrix.component.file }}
          context: ${{ matrix.component.context }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

  # Builds FROM qubership-docker-integration-tests at the same git ref, so it
  # must wait for build-base to publish the base image first.
  build-hardening:
    needs: build-base
    if: github.event.pull_request.user.login != 'dependabot[bot]' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    name: qubership-docker-integration-tests-hardening
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Build & push image
        uses: ./.github/actions/build-docker-image
        with:
          component-name: qubership-docker-integration-tests-hardening
          file: container-hardening/docker/Dockerfile
          context: container-hardening
          use-base-tag: 'true'
          github-token: ${{ secrets.GITHUB_TOKEN }}
